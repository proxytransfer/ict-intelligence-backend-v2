services:
  - type: web
    name: probabilistic-engine-v2
    env: python
    buildCommand: pip install --only-binary=pandas -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.9
