version: "1"
services:
  - type: web
    name: probabilistic-engine
    runtime: python
    repo: https://github.com/proxytransfer/probabilistic-engine-v2-backend
    plan: free
    region: oregon
    buildCommand: pip install --only-binary=pandas -r requirements.txt
    startCommand: uvicorn api.server:app --host 0.0.0.0 --port $PORT
    autoDeployTrigger: commit
    healthCheckPath: /docs
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PORT
        value: 10000
